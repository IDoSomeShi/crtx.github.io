<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="css/style.css">
<script type="module" src="js/main.js"></script>

<style>
body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}
.auth-box {
    width: 320px;
    padding: 30px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,255,156,0.2);
    border-radius: 14px;
    backdrop-filter: blur(10px);
    text-align: center;
}
input {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: transparent;
    border: 1px solid #00ff9c;
    color: #00ff9c;
}
</style>
</head>

<body>

<div class="auth-box">
<h2>SynAura Access</h2>
<p style="opacity:0.6; font-size:13px;">Enter or create your identity</p>

<input id="user">
<input id="pass">

<button onclick="loginUser(
document.getElementById('user').value,
document.getElementById('pass').value
)">Login</button>

<button onclick="registerUser(
document.getElementById('user').value,
document.getElementById('pass').value
)">Register</button>
</div>

</body>
</html>
