<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#07110c"></stop>
      <stop offset="100%" stop-color="#020403"></stop>
    </radialGradient>

    <linearGradient id="glow" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#00ff9c" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"></rect>

  <!-- SCANNING LINE -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#glow)">
    <animate attributeName="y" values="0;220;0" dur="6s" repeatCount="indefinite"></animate>
  </rect>

  <!-- NODES -->
  <g fill="#00ff9c">
    <circle cx="150" cy="120" r="2">
      <animate attributeName="cy" values="110;130;110" dur="4s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="350" cy="90" r="2">
      <animate attributeName="cy" values="80;100;80" dur="5s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="650" cy="130" r="2">
      <animate attributeName="cy" values="120;140;120" dur="3s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="900" cy="100" r="2">
      <animate attributeName="cy" values="90;110;90" dur="4s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <!-- CONNECTIONS -->
  <g stroke="#00ff9c" stroke-opacity="0.08">
    <line x1="150" y1="120" x2="350" y2="90"></line>
    <line x1="350" y1="90" x2="650" y2="130"></line>
    <line x1="650" y1="130" x2="900" y2="100"></line>
  </g>

  <!-- TITLE -->
  <text x="50%" y="95" text-anchor="middle" fill="#00ff9c" font-size="48" letter-spacing="6" font-family="Segoe UI, sans-serif">
    CRTX
  </text>

  <!-- TAGLINE -->
  <text x="50%" y="135" text-anchor="middle" fill="#00ff9c" opacity="0.6" font-size="14" font-family="Segoe UI, sans-serif">
    Intelligence · Automation · Control
  </text>

</svg>