<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="css/style.css">

<style>
body {
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.terminal {
    background: black;
    color: #00ff9c;
    padding: 20px;
    font-family: monospace;
    height: 80vh;
    overflow-y: auto;
}

input {
    background: none;
    border: none;
    color: #00ff9c;
    outline: none;
}
</style>

<script defer src="js/main.js"></script>
</head>

<body>

<nav>
<h1>SynAura</h1>
<div>
<a href="index.html">Home</a>
<a href="system.html">System</a>
<a href="ai.html">AI</a>
<a href="docs.html">Docs</a>
<a href="terminal.html">Terminal</a>
</div>
</nav>

<div class="terminal" id="terminal">
    <div>> SynAura Terminal</div>
</div>

<input id="input" autofocus />

<script>
const term = document.getElementById("terminal");
const input = document.getElementById("input");

input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        let cmd = input.value;
        term.innerHTML += `<div>> ${cmd}</div>`;

        if (cmd === "help") {
            term.innerHTML += `<div>Available: help, clear</div>`;
        }

        if (cmd === "clear") {
            term.innerHTML = "";
        }

        input.value = "";
    }
});
</script>

</body>
</html>
